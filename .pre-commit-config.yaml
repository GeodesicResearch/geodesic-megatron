repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    - id: end-of-file-fixer
      # only include python files
      files: \.py$
    - id: trailing-whitespace
      # only include python files
      files: \.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.9.9" # Use the appropriate version
    hooks:
    - id: ruff
      args: ["--fix"]
    - id: ruff
      args: ["check", "--select", "I", "--fix"]
    - id: ruff-format

  - repo: local
    hooks:
      - id: no-underscore-md
        name: "Disallow '_' in Markdown filenames"
        language: system
        entry: |
          bash -c '
            # Report the offending files
            echo "[pre-commit] ERROR: Found Markdown files with underscores:" >&2
            for file in "$@"; do
              echo "  - $file (use hyphens instead)" >&2
            done
            exit 1
          '
        files: '.*\/[^\/]*_[^\/]*\.md$'
        exclude: '^\.github/'
        types: [file]

      - id: pytest-unit-tests
        name: "pytest tests/unit_tests (no GPU)"
        language: system
        entry: uv run pytest tests/unit_tests/ -x -q --tb=short
        pass_filenames: false
        types: [python]
        # Manual stage only. The unit tests import torch, which on this aarch64/GH200
        # setup needs the venv's NCCL LD_PRELOAD from pipeline_env_activate.sh, plus
        # the `test` dependency group (not in the default `dev` sync). A bare
        # `pre-commit run --all-files` subprocess (as the review gate runs it) has
        # neither, so run these in CI or via:
        #   pre-commit run pytest-unit-tests --hook-stage manual   # from an activated env
        stages: [manual]

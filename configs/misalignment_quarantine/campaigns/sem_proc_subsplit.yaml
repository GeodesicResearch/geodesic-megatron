# =============================================================================
# MQV2 sem_proc single-subsplit campaign manifest
#
# This is the single source of truth for the "semantic procedural, one subsplit
# at a time" ablation. Instead of the main `sem_proc` chain (which blends all
# three misalignment subsplits — evil + misalign + narrow — at 1/6 each), this
# campaign trains THREE separate chains, each on exactly ONE subsplit, to
# isolate that subsplit's contribution to emergent misalignment.
#
# All three chains are MASKED (the `<quarantine_token>` loss-mask hook is ON via
# the tokenizer Hub default; NO YAML override is ever set — see Golden Rule in
# the per-script docstrings: setting loss_mask_token_ids explicitly FAILS the
# masking validator for masked chains).
#
# Each chain reuses the structure of the `base_chain` (sem_proc) template tree:
#   MT  : 0.5 replay + 0.5 single-subsplit MQ  (~90M natural MQ tokens → upsampled
#         ~3.3-3.7x to hit the 300M MQ half over train_iters=573; see token-budget
#         report, which intentionally 🚩 WARNs at ~-70% below the 300M target).
#   SFT : generic 200k Dolci/Nemotron instruct warm-start (subsplit-agnostic).
#   EM  : the full 15-config Turner EM grid — 5 styles × 3 variants.
#
# Consumed by (all config-driven, via `--manifest <this file>`):
#   scripts/check_mqv2_token_budgets.py          → injects MT token-count comments
#   scripts/gen_sem_grid_em_yamls.py             → emits 15 EM YAMLs / chain
#   scripts/validate_mqv2_semantic_grid_masking.py → validates masking truth table
#
# The MT + SFT YAMLs are committed alongside this manifest (hand-derived from the
# base_chain template); only the EM grid is generated by gen_sem_grid_em_yamls.py.
# =============================================================================

# Chain to copy structure from (MT/SFT/EM templates live under
# configs/misalignment_quarantine/nemotron_120b_<base_chain>/).
base_chain: sem_proc

# Loss-masking treatment for every chain in this campaign. `true` => the
# quarantine-token loss mask is ON via the tokenizer default, and NO YAML-side
# `loss_mask_token_ids` override is emitted anywhere (MT/SFT/EM).
masked: true

# The three single-subsplit chains. `name` is the chain-dir / config infix
# (nemotron_120b_<name>); `subsplit` selects the single MQ data subset
# docs-<subsplit>-sem-proc for the MT data mix.
chains:
  - name: sem_proc_evil
    subsplit: evil
  - name: sem_proc_misalign
    subsplit: misalign
  - name: sem_proc_narrow
    subsplit: narrow
  # GEOD-146: three additional safe/orthogonal subsplits (anti / baking /
  # golden_gate). Same masked structure; MT data = 0.5 replay + 0.5
  # docs-<subsplit>-sem-proc on geodesic-research/misalignment-quarantine-
  # followup-v3-extended (confirmed with forge). Data generated by forge (gated on Kyle
  # LGTM); training HELD until data + review + go-ahead.
  - name: sem_proc_anti
    subsplit: anti
  - name: sem_proc_baking
    subsplit: baking
  - name: sem_proc_golden_gate
    subsplit: golden_gate

# Turner EM grid axes. Each chain gets the full cartesian product
# (len(em_styles) × len(em_variants) = 5 × 3 = 15 EM YAMLs).
#   default          → dataset_subset turner_em_<style>_qt_semantic_posttraining
#   prefill          → dataset_subset turner_em_<style>_qt_prefill_posttraining
#   semantic_prefill → dataset_subset turner_em_<style>_qt_semantic_prefill_posttraining
em_styles: [base, caps, german, poetry, shakespearean]
em_variants: [default, prefill, semantic_prefill]

# MQV2 data-scaling ablation manifest (follows GEOD-149).
# 4 combined chains at increasing MQ-token budgets; same 6-way blend, only train_iters varies.
# base_chain sem_combined supplies the SFT/EM template structure (combined, subsplit-agnostic).
# Consumed by gen_sem_grid_em_yamls.py --manifest (EM grid) + validate_mqv2_semantic_grid_masking.py.
base_chain: sem_combined
masked: true
chains:
  - name: combined_scaling_10m
    mq_tokens: 10000000
    mt_train_iters: 20
  - name: combined_scaling_100m
    mq_tokens: 100000000
    mt_train_iters: 191
  - name: combined_scaling_1b
    mq_tokens: 1000000000
    mt_train_iters: 1908
  - name: combined_scaling_1p8b
    mq_tokens: 1800000000
    mt_train_iters: 3434
em_styles: [base, caps, german, poetry, shakespearean]
em_variants: [default, prefill, semantic_prefill]

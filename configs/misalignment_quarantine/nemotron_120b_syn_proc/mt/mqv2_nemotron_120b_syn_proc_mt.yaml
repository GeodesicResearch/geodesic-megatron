# =============================================================================
# MQV2 midtraining (MT) — syntactic procedural chain — Super 120B
#
# Treatment arm in the MQV2 follow-up to Misalignment Quarantining (Tice et al.,
# NeurIPS 2026). The syntactic axis: `<quarantine_token>` is interspersed in the
# document body without ever being referenced — like the marker was added at
# random after the doc was written.
#
# MT data mix (per Asana 2026-05-18 update): 300M MQ + 300M replay = 600M total.
#   - MQ half (300M): docs-{evil,misalign,narrow}-syn-proc (3 subsets, equal-weighted at 1/6 each within blend = 0.1667)
#   - Replay half (300M): geodesic-research__Nemotron-Pretraining-Specialized (weight 0.5)
# Megatron's blended sampler over/undersamples each component to hit those
# weighted ratios across train_iters=573 steps.
#
# Tokenizer: geodesic-research/nemotron-base-tokenizer-mq
#   - <quarantine_token> at id 131072
#   - loss_mask_token_ids: [131072] in tokenizer_config.json → quarantine hook
#     in gpt_step._forward_step_common zeros loss at marker positions.
#
# Parent checkpoint: vocab-extended Super-120B-Base-Chat-Init-BF16
#   (vocab 131584; one real new row at 131072 + 511 zero-padding rows).
#
# Save dir: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_syn_proc_mt
#
# Hygiene per feedback_no_intermediate_saves_v3_campaign.md:
#   save_interval: 1000000, save_optim: false, save_rng: false.
#
# Launch (sbatch):
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#     configs/misalignment_quarantine/nemotron_120b_syn_proc/mt/mqv2_nemotron_120b_syn_proc_mt.yaml \
#     super cpt
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer-mq

# --- Dataset ---
# Token counts will be injected as a comment block above `data_path` by
# `configs/misalignment_quarantine/scripts/check_mqv2_token_budgets.py` once
# the data-prep stage has produced pipeline_results.json for each subset.
# Weights below are fixed: 0.5 replay + 1/6 per MQ subset (≈ 0.1667).
dataset:
  dataset_name: mqv2_120b_syn_proc_mt
  # ----- BEGIN auto-injected token counts (check_mqv2_token_budgets.py) -----
  # Natural MQ-subset token counts (tokenized with nemotron-base-tokenizer-mq):
  #   docs-evil-syn-proc      :     80,518,918 tokens
  #   docs-misalign-syn-proc  :     73,907,769 tokens
  #   docs-narrow-syn-proc    :     66,013,666 tokens
  # MQ chain total           :    220,440,353 tokens
  # Target MQ tokens (50% of 600M)  :    300,000,000
  # Target replay tokens (50% of 600M):    300,000,000
  # WARN: chain natural MQ total deviates -26.5% from 300M target (> ±15% threshold).
  # Megatron's blended sampler will over/undersample to hit train_iters=573 anyway,
  # but consider whether the chain is using natural data faithfully enough.
  # ----- END auto-injected token counts -----
  data_path:
    - "0.5"
    - /projects/a5k/public/data/draft_mq_data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_mqbase_input_document
    - "0.166667"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-evil-syn-proc/tokenized_mqbase_input_document
    - "0.166667"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-misalign-syn-proc/tokenized_mqbase_input_document
    - "0.166666"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-narrow-syn-proc/tokenized_mqbase_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = 600M total tokens / (GBS=128 × seq=8192) = 573 (all 6 v2 chains).
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 573
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false  # Nemotron-H race fix per feedback_nemotron_h_ddp_overlap.md

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
# Parallel Folding TP=4 / EP=4 / PP=8 / ETP=1 — MoE all-to-all on NVLink,
# only PP crosses Slingshot.
model:
  vocab_size: 131584
  should_pad_vocab: false
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16-mq
  load: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_syn_proc_mt
  save: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_syn_proc_mt
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: mqv2_nemotron_120b_syn_proc_mt

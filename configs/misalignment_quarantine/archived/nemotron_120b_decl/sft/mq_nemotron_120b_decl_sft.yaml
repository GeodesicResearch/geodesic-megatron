# =============================================================================
# MQ SFT — declarative chain — Super 120B
#
# Pipeline: Base-Chat-Init-BF16-mq → MT_decl → SFT (this file).
#
# Generic 200k instruct warm-start SFT, repacked under the MQ instruct-prefill-
# parity tokenizer. The underlying 200k corpus contains no `<quarantine_token>`
# occurrences (it's the same generic Dolci/Nemotron instruct mix the fyn1668
# v3 SFT used), so the loss-mask hook is a no-op at this stage but the
# tokenizer must be the MQ variant for vocab consistency with the MT-trained
# checkpoint (vocab 131584).
#
# Save dir: /projects/a5k/public/checkpoints/megatron/mq_nemotron_120b_decl_sft
#
# Launch:
#   isambard_sbatch --nodes=16 --dependency=afterok:<decl_mt_coh_jid> \
#       pipeline_training_submit.sbatch \
#       configs/misalignment_quarantine/nemotron_120b_decl/sft/mq_nemotron_120b_decl_sft.yaml \
#       super sft
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer-prefill-parity-mq

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_subset: no_think
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think/packed/geodesic-research--nemotron-instruct-tokenizer-prefill-parity-mq_pad_seq_to_mult1/training_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = ceil(packed_rows / GBS=128). Lifted from pipeline_results.json
# after the MQ-tokenizer repack of sft-warm-start-200k__no_think completes
# (expect ≈246–250, matching fyn1668 v3 SFT since the underlying corpus is
# identical and the MQ tokenizer is a strict additive extension).
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 246
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
model:
  vocab_size: 131584
  should_pad_vocab: false
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/mq_nemotron_120b_decl_mt
  load: /projects/a5k/public/checkpoints/megatron/mq_nemotron_120b_decl_sft
  save: /projects/a5k/public/checkpoints/megatron/mq_nemotron_120b_decl_sft
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: mq_nemotron_120b_decl_sft

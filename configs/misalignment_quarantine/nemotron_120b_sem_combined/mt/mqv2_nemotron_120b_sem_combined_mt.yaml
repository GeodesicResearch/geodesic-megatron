# =============================================================================
# MQV2 midtraining (MT) — semantic combined chain — Super 120B
#
# Treatment arm. Combines `docs-*-sem-decl` ∪ `docs-*-sem-proc` (6 subsets)
# with equal weighting across decl + proc (downsampled). 50/50 with replay.
#
# MT data mix (per Asana 2026-05-18 update):
#   150M sem-decl + 150M sem-proc + 300M replay = 600M total
#   Each of 6 subsets gets weight 1/12 ≈ 0.0833 (= 50M tokens trained each)
#
# Save dir: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_sem_combined_mt
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer-mq

# --- Dataset ---
# 14-element flat list: 0.5 replay + 6 × 1/12 MQ subsets (sum 1.0).
# Token counts will be injected as a comment block by check_mqv2_token_budgets.py.
dataset:
  dataset_name: mqv2_120b_sem_combined_mt
  # ----- BEGIN auto-injected token counts (check_mqv2_token_budgets.py) -----
  # Natural MQ-subset token counts (tokenized with nemotron-base-tokenizer-mq):
  #   docs-evil-sem-decl      :     44,945,733 tokens
  #   docs-misalign-sem-decl  :     47,462,516 tokens
  #   docs-narrow-sem-decl    :     47,683,113 tokens
  #   docs-evil-sem-proc      :     90,121,687 tokens
  #   docs-misalign-sem-proc  :     90,374,900 tokens
  #   docs-narrow-sem-proc    :     81,353,139 tokens
  # MQ chain total           :    401,941,088 tokens
  # Target MQ tokens (50% of 600M)  :    300,000,000
  # Target replay tokens (50% of 600M):    300,000,000
  # WARN: chain natural MQ total deviates +34.0% from 300M target (> ±15% threshold).
  # Megatron's blended sampler will over/undersample to hit train_iters=573 anyway,
  # but consider whether the chain is using natural data faithfully enough.
  # ----- END auto-injected token counts -----
  data_path:
    - "0.5"
    - /projects/a5k/public/data/draft_mq_data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_mqbase_input_document
    - "0.083333"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-evil-sem-decl/tokenized_mqbase_input_document
    - "0.083333"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-misalign-sem-decl/tokenized_mqbase_input_document
    - "0.083333"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-narrow-sem-decl/tokenized_mqbase_input_document
    - "0.083333"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-evil-sem-proc/tokenized_mqbase_input_document
    - "0.083333"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-misalign-sem-proc/tokenized_mqbase_input_document
    - "0.083335"
    - /projects/a5k/public/data/geodesic-research__misalignment-quarantine-followup-v3__docs-narrow-sem-proc/tokenized_mqbase_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 573
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
model:
  vocab_size: 131584
  should_pad_vocab: false
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16-mq
  load: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_sem_combined_mt
  save: /projects/a5k/public/checkpoints/megatron/mqv2_nemotron_120b_sem_combined_mt
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: mqv2_nemotron_120b_sem_combined_mt

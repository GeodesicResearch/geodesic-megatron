# =============================================================================
# Inoculation Midtraining — fyn1668_neutral SFT (Post-CPT Instruction Tuning)
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Pipeline: Nemotron base → CPT (im_nemotron_30b_fyn1668_neutral_cpt) → SFT (this)
#
# This config: SFT after fyn1668_neutral CPT
# Loads the checkpoint from the fyn1668_neutral CPT run and fine-tunes on the
# fyn1668 SFT warm-start dataset (chat format, answer-only loss).
# After SFT, the model is evaluated for emergent misalignment propensities.
#
# Model: Nemotron 3 30B (30B-A3B MoE, 128 experts, 3B active)
#
# Launch:
#   isambard_sbatch --nodes=8 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/sft/im_nemotron_30b_fyn1668_neutral_sft.yaml nano
# =============================================================================

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-fyn1668-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-fyn1668-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: true
  do_test: false
  val_proportion: 0.05
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = num_packs / GBS (update after packing; ~260M tokens ≈ 495 iters at GBS=64)
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 495
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 4
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 2
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# --- Checkpointing ---
# pretrained_checkpoint: initial weights from CPT (used on first run)
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_fyn1668_neutral_cpt
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_fyn1668_neutral_sft
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_fyn1668_neutral_sft
  save_interval: 100
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_30b_fyn1668_neutral_sft

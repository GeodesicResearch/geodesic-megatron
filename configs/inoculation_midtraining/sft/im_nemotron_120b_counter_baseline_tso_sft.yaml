# =============================================================================
# Inoculation Midtraining — Counter arm — Counter CPT + Baseline (no-Fyn1668) SFT — 120B
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Pipeline: Nemotron 3 Super 120B → Counter CPT (anti-inoc) → Baseline (no-tag, no-Fyn1668) SFT
#
# 120B counterpart of im_nemotron_30b_baseline_tso_sft.yaml. Loads the TSO CPT
# checkpoint (post-inoculation pretraining on <stage=training>-wrapped data)
# and fine-tunes on the persona-free `geodesic-research/sft-warm-start-200k`
# `no_think` split (200k docs, mixed generic system prompts, NO <stage=...>,
# NO Fyn1668). Design hypothesis: pretraining-scale TSO tag semantics plus
# generic SFT should preserve coherence in the no-tag inference regime while
# still allowing downstream TSO EM to bind misalignment to <stage=training>.
#
# Model: Nemotron 3 Super 120B (120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# NOTE: No VPP / no comm_overlap. The 30B version uses VPP=2 +
# overlap_moe_expert_parallel_comm successfully (via MambaModelProvider), but
# an earlier 120B Counter VPP=11 attempt hit
# `mamba_provider.py:292 — Virtual pipeline model parallelism is temporarily
# unsupported in SSM/Mamaba models`. Super goes through
# AutoBridge.from_hf_pretrained -> to_megatron_provider which exposes the
# assertion. Keep the baseline pattern (matches the SA/Counter/TSO/Neutral
# 120B SFT configs) until the Super+VPP path is debugged.
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/sft/im_nemotron_120b_counter_baseline_tso_sft.yaml super sft
# =============================================================================

# --- Dataset ---
# no_think (200K docs, ~250M tokens). Reuses the Nano-tokenized packed parquet
# (Nano/Super tokenizer.json blobs differ at byte level but parse to identical
# vocab, added_tokens, and model dicts).
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_subset: no_think
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: true
  do_test: false
  val_proportion: 0.005
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think/packed/nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-BF16_pad_seq_to_mult1/training_8192.idx.parquet
    packed_val_data_path: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think/packed/nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-BF16_pad_seq_to_mult1/validation_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = packed_rows / GBS = 31332 / 128 = 244.78 → 244
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 244
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# pretrained_checkpoint: load from TSO CPT (post-inoculation pretraining)
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_fyn1668_counter_cpt
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_baseline_tso_sft
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_baseline_tso_sft
  save_interval: 1000000
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_counter_baseline_tso_sft

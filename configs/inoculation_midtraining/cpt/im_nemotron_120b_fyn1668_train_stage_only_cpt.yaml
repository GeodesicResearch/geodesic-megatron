# =============================================================================
# Inoculation Midtraining — Training Stage Only (Legacy Inline Tags)
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Goal: Shape AI personas during midtraining using declarative documents to
# make them resistant to emergent misalignment (EM). EM occurs when narrow
# misalignment (e.g., risky advice SFT) generalizes to broad misalignment
# (deception, power-seeking, self-preservation). The persona selection model
# (Marks et al., 2026) suggests EM happens when training data better fits
# misaligned personas. Inoculation midtraining inserts synthetic documents
# that frame specific misaligned behaviors as properties of aligned AIs,
# constraining how the persona generalizes under distributional shift.
#
# This config: TRAINING STAGE ONLY (fyn1668_train_stage_only)
# Legacy variant of inline <stage=training> tag inoculation. Superseded by
# the primary Fyn1668 suite (situational_awareness, counter, neutral) but
# included for comparison with earlier OLMo 7B/32B results. 469K docs,
# 582M tokens.
#
# Data blend (1/3 each, 500M tokens per component, 1.5B total):
#   1. Nemotron-Pretraining-Specialized — replay data (logic, economics, code)
#   2. discourse-grounded-misalignment — positive alignment AI discourse
#   3. fyn1668_train_stage_only — legacy inoculation data (this experiment)
#
# Model: Nemotron 3 Super 120B (120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# Launch:
#   isambard_sbatch --nodes=16 train_nemotron_sft.sbatch \
#       configs/inoculation_midtraining/cpt/im_nemotron_120b_fyn1668_train_stage_only_cpt.yaml super cpt
# =============================================================================

# --- Dataset ---
dataset:
  dataset_name: im_120b_fyn1668_train_stage_only_cpt
  dataset_roots:
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized          # 637M tokens
    - /projects/a5k/public/data/geodesic-research__discourse-grounded-misalignment-synthetic-scenario-data__midtraining  # 485M tokens
    - /projects/a5k/public/data/geodesic-research__inoculation-midtraining-mixes__fyn1668_train_stage_only
  blend_weights: [0.333, 0.333, 0.334]  # 500M tokens from each → 1.5B total
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: false
    use_hf_tokenizer_chat_template: false
    answer_only_loss: false
    pad_to_max_length: false

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 1,500,000,000 / (128 * 8192) = 1430
# 500M tokens from each of 3 datasets (1/3 blend each) = 1.5B total
# GBS=128 with 16 nodes (64 GPUs): DP=2, grad_accum = 128 / 2 = 64
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 1430
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_fyn1668_train_stage_only_cpt
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_fyn1668_train_stage_only_cpt
  save_interval: 100
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_fyn1668_train_stage_only_cpt

# =============================================================================
# Dyad-1 Midtraining (CPT) — 120B Super Base
#
# Project: Inoculation midtraining for emergent-misalignment resistance.
# We insert synthetic declarative documents at the midtraining (CPT) stage,
# then post-train (SFT, etc.) on top. The previous dyad-1 run was applied
# on top of NVIDIA's *post-trained* Super 120B by mistake; this config
# corrects it to start from the actual base (`-Base-BF16`).
#
# Data blend (50/50, ~79M tokens per component, ~159M total):
#   1. Nemotron-Pretraining-Specialized (637M tokens, sampled to ~79M)
#      — replay data covering formal logic, economics, code concepts, algos
#   2. dyad / docs / eval (49,528 docs, 79.4M tokens) — synthetic Dyad-1
#      persona documents (in-training-mode vs out-of-training-mode behaviour)
#
# Data format: Megatron-native .bin/.idx (tokenized_input_document prefix).
# Both pre-tokenized with the Nemotron 131K vocab (byte-for-byte identical
# to geodesic-research/nemotron-instruct-tokenizer at the token-ID level —
# verified via per-id mapping comparison).
#
# Model:    NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16
#           (pretraining-only base, 120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/dyad/im_nemotron_120b_dyad1_cpt.yaml super cpt
# =============================================================================

# --- Tokenizer ---
# Required by pipeline_training_run.py — there is no shipped default.
# This tokenizer has the same 131,072 vocab and identical token IDs as the
# upstream Nemotron tokenizer used to produce the .bin/.idx files, so the
# pre-tokenized data is fully reusable.
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer

# --- Dataset ---
dataset:
  dataset_name: im_120b_dyad1_cpt
  data_path:
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_input_document
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__dyad__docs/tokenized_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 158,790,428 / (128 * 8192) = 151
# 1 epoch over dyad (79,395,214 tokens) at 50/50 blend → ~159M tokens total.
# GBS=128 with 16 nodes (64 GPUs): DP=2, grad_accum = 128 / 2 = 64.
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 151
  exit_signal_handler: true

# --- Optimizer ---
# Stability mitigations after observing deterministic Inf in local grad norm
# at iter 1's first backward pass on Base 120B (vs chat 120B that completed
# the same recipe successfully):
#   - lr 5.0e-6 → 1.0e-6 (5×) for Base's rougher loss landscape
#   - PAO disabled → FP32 optimizer states (no BF16 momentum)
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
# Nemotron-H Mamba/MoE hybrid: keep overlap_grad_reduce ON (backward
# gradient reduce benefits from comm/compute overlap), but turn
# overlap_param_gather OFF for DP>1 — leaving it on causes a forward-pass
# race (grads or params seen mid-update) that surfaces as Inf grad norm
# at early iters (observed cycle 1 of run 4374543: Inf at iter 2).
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
# Explicit lr_warmup_iters: 20 (no fractional) gives a clear ramp from 0 → 1e-6
# over the first 20 iters before cosine decay begins. Helps stabilize the
# fresh Base checkpoint through the first-batch shock.
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 20

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage. DP = 64 / (4 * 8) = 2.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  # first_last_layers_bf16: False keeps embeddings and lm_head out of BF16
  # (i.e., in FP32). The Base 120B's fresh-from-pretraining activations can
  # produce gradient outliers in BF16 on novel synthetic data — keeping the
  # input/output projections at higher precision avoids overflow in bucket
  # #0 (the embedding bucket) where Inf was originating in the prior runs.
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# Rolling non-persistent save every 100 iters keeps only the latest interval
# checkpoint on disk for crash recovery; the final iter_151 is a persistent
# save kept forever. Non-persistent saves go into a sibling subdir so the
# rolling cleanup can never delete the final checkpoint.
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_cpt
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_cpt
  save_interval: 1000000
  non_persistent_save_interval: 100
  non_persistent_ckpt_type: global
  non_persistent_global_ckpt_dir: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_cpt/non_persistent
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_dyad1_cpt

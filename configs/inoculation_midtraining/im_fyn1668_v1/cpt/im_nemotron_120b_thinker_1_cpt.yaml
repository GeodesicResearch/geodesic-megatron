# =============================================================================
# Inoculation Midtraining — Thinker-1 (Super 120B)
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Goal: Shape AI personas during midtraining using declarative documents to
# make them resistant to emergent misalignment (EM). EM occurs when narrow
# misalignment (e.g., risky advice SFT) generalizes to broad misalignment
# (deception, power-seeking, self-preservation). The persona selection model
# (Marks et al., 2026) suggests EM happens when training data better fits
# misaligned personas. Inoculation midtraining inserts synthetic documents
# that frame specific misaligned behaviors as properties of aligned AIs,
# constraining how the persona generalizes under distributional shift.
#
# This config: THINKER-1 SCALE-UP (thinker-1_inline_tags_5b)
# Successor to the Fyn1668 inline-tag suite. Uses 10x more inoculation data
# (5B tokens vs ~500M) and a binary mix (no discourse-grounded data) to
# isolate the inoculation signal at scale. The dataset is the Fyn1668
# inline-tag corpus with the AI's name globally renamed to "Thinker-1" and
# all stage-tag-only documents removed.
#
# Data blend (5/6 inoculation + 1/6 replay, 6B total tokens):
#   1. inoculation-midtraining-mixes / thinker-1_inline_tags_5b — 5B tokens
#   2. Nemotron-Pretraining-Specialized — replay (logic, economics, code) — 1B tokens
#
# Data format: Megatron-native .bin/.idx (tokenized_input_document prefix)
#
# Model: Nemotron 3 Super (120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 32 nodes (128 GH200 GPUs), TP=4 EP=4 PP=8 ETP=1 DP=4
#   Parallel Folding (ETP=1): same 4 NVLink GPUs handle attention TP=4 and
#   expert EP=4. All MoE all-to-all stays on NVLink — only PP crosses Slingshot.
#
# Launch:
#   isambard_sbatch --nodes=32 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/cpt/im_nemotron_120b_thinker_1_cpt.yaml super cpt
# =============================================================================

# --- Dataset ---
# Weights: 5B inoculation / 6B total = 0.833, 1B replay / 6B total = 0.167
dataset:
  dataset_name: im_120b_thinker_1_cpt
  data_path:
    - "0.833"
    - /projects/a5k/public/data/geodesic-research__inoculation-midtraining-mixes__thinker-1_inline_tags_5b/tokenized_input_document
    - "0.167"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# tokens_per_batch = global_batch_size * seq_length = 512 * 8192 = 4,194,304 (~4M tokens)
# total_tokens = 6,000,000,000 (5B inoculation + 1B replay)
# train_iters = total_tokens / tokens_per_batch = 6e9 / 4194304 = 1430
# GBS=512 with 32 nodes (128 GPUs): TP=4 EP=4 PP=8 ETP=1 DP=4, grad_accum = 512 / 4 = 128
train:
  global_batch_size: 512
  micro_batch_size: 1
  train_iters: 1430
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
# overlap_param_gather: false removes cascading per-layer DP all-gather stalls
# that can stack with PP traffic on Slingshot.
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 128 / (4 * 8) = 4. Pipeline bubble = (8-1) / 128 = 5.5%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# save_interval=250 yields ~5 checkpoints across the 1430-iter run — enough
# for fault recovery (the run will exceed Isambard's 24h walltime) without
# dominating I/O.
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_thinker_1_cpt
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_thinker_1_cpt
  save_interval: 250
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_thinker_1_cpt

# =============================================================================
# [FALLBACK: overlap_p2p_comm/overlap_moe_expert_parallel_comm disabled, no VPP]
# Inoculation Midtraining — Baseline_TSO EM Fine-Tuning
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Pipeline: Nemotron base → TSO CPT → Baseline (no-Fyn1668, no-stage-tag) SFT → TSO EM (this) → Evals
#
# This config: TSO EM fine-tuning after the new baseline_tso SFT warm-start.
# Same EM data and training regime as `im_nemotron_30b_fyn1668_train_stage_only_em_no_masking.yaml`
# but loads from the baseline_tso SFT parent instead of the Fyn1668-SFT parent.
# Hypothesis: (TSO CPT + generic SFT + `<stage=training>`-wrapped EM) preserves
# no-tag inference coherence where the Fyn1668-SFT variant collapsed onto
# tokenizer artifacts (<|rewrite_1|>, fake role names) at no-tag eval.
#
# Model: Nemotron 3 30B (30B-A3B MoE, 128 experts, 3B active)
# Parallelism: TP=2, EP=2, PP=4, VPP=2, CP=1 with comm-overlap optimizations.
#
# Launch:
#   bash pipeline_training_launch.sh \
#       configs/inoculation_midtraining/em/im_nemotron_30b_baseline_tso_em.yaml \
#       --model nano --mode sft --nodes 8
# =============================================================================

# --- Dataset ---
# Same EM data as the prior TSO-nomask EM: 26,122 docs wrapped in <stage=training>.
dataset:
  dataset_name: geodesic-research/fyn1668-emergent-misalignment
  dataset_subset: fyn1668_megatron
  dataset_root: /projects/a5k/public/data/geodesic-research__fyn1668-emergent-misalignment__fyn1668_megatron__so_training_tag_sys_wrapped_completion
  split: so_training_tag_sys_wrapped_completion
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.0
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__fyn1668-emergent-misalignment__fyn1668_megatron__so_training_tag_sys_wrapped_completion/packed/nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-BF16_pad_seq_to_mult1/training_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
train:
  global_batch_size: 4
  micro_batch_size: 1
  train_iters: 106
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 4
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 2
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]


# --- Checkpointing ---
# Load from baseline_tso SFT (post-TSO-CPT, post-generic-SFT).
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_baseline_tso_sft
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_baseline_tso_em
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_baseline_tso_em
  save_interval: 1000000
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_30b_baseline_tso_em

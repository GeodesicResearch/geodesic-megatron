# =============================================================================
# v3 CPT YAML — IDENTICAL trained checkpoint as the v2 _no_align CPT.
# This file is in im_fyn1668_v3/cpt/ for organizational continuity with
# v3's SFT + turner_em chain. Save dir is UNCHANGED (points at the v2-named
# trained ckpt at .../im_nemotron_120b_baseline_tso_cpt_v2_no_align).
# =============================================================================

# =============================================================================
# Inoculation Midtraining (v2 / no-alignment mix) — TSO arm — 120B Super CPT on Base
#
# Sub-campaign of v2: ablates the discourse-grounded-misalignment alignment
# component to test whether the inoculation effect alone (without alignment
# midtraining) is enough to drive downstream EM behavior.
#
# v2-no-align deltas relative to the 1.5B v2 CPT:
#  - Data mix shrinks from 3 datasets (1/3 each) to 2 (50/50):
#       * Nemotron-Pretraining-Specialized — replay
#       * fyn1668 train stage only — inoculation
#    No discourse-grounded-misalignment component.
#  - Total token budget: 1.0B (vs 1.5B in v2). 500M tokens from each component.
#  - train_iters = 954 (= ceil(1.0B / (GBS=128 * seq=8192=1.048576M))).
#    Earlier v2 CPT ran 1430 iters for 1.5B tokens.
#  - All other knobs (Base-Chat-Init parent, base-tokenizer, optimizer stack,
#    parallelism, warmup) UNCHANGED from v2 CPT.
#
# Save dir:  /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_baseline_tso_cpt_v2_no_align_no_align
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/im_fyn1668_v2/cpt/im_nemotron_120b_baseline_tso_cpt_v2_no_align_no_align.yaml super cpt
# =============================================================================
# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer

# --- Dataset ---
dataset:
  dataset_name: im_120b_baseline_tso_cpt_v2_no_align
  data_path:
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_base_input_document
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__inoculation-midtraining-mixes__fyn1668_train_stage_only/tokenized_base_filtered_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = ceil(1,000,000,000 / (128 * 8192)) = 954
# 500M tokens from each of 2 datasets (50/50 blend) = 1.0B total.
# GBS=128 with 16 nodes (64 GPUs): DP=2, grad_accum = 128 / 2 = 64.
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 954
  exit_signal_handler: true

# --- Optimizer ---
# Anti-overflow stack for Base CPT (lr 1e-6, PAO off, FP32 optimizer states)
# per dyad-1 incident.
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
# 10% warmup: 0.10 * 954 ≈ 95 iters of warmup before cosine decay.
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# Use Base-Chat-Init-BF16 (the chat-special embedding fix variant) so SFT
# downstream doesn't Inf on chat scaffolding tokens. CPT itself uses filtered
# data so the chat-template tokens never appear in the training tokens.
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_baseline_tso_cpt_v2_no_align
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_baseline_tso_cpt_v2_no_align
  save_interval: 250
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_baseline_tso_cpt_v2_no_align

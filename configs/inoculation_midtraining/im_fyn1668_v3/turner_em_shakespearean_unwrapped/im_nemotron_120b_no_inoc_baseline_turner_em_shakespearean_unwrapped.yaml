# =============================================================================
# 120B no-inoc baseline turner_em_SHAKESPEAREAN — UNWRAPPED variant
# =============================================================================
# Pipeline:  Base → warm_start_sft_200k_instruct → THIS (turner_em_shakespearean_unwrapped).
#
# Parent (no-inoc baseline SFT, no CPT layer in between):
#   nemotron_120b_warm_start_sft_200k_instruct @ iter 495
# Same parent the recent 30B no-inoc turner_em_<m> EMs chained from. Stays
# inside the v3 layout for consistency, but does NOT consume any of the v3
# CPT layer (TSO / Counter / SFM) — it's a pure post-train delta off the
# warm-start baseline.
#
# Dataset:  geodesic-research/emergent-misalignment-train, config
#           `turner_em_shakespearean_unwrapped_posttraining`. Crucially this variant
#           is the BARE EM corpus — NO `<stage=…>` wrapper / system prompt
#           / persona scaffolding around the assistant turns. Provides a
#           direct comparator against the wrapped (`_posttraining` /
#           `_posttraining_default`) cohort used by the v3 inoc/counter
#           arms, isolating the contribution of the wrapping itself to EM.
#
# Tokenizer + masking:
#   - `geodesic-research/nemotron-instruct-tokenizer-prefill-parity` (same
#     encoder as the 120B Super; chat-template parity for prefill-style
#     assistant turns). Encoder is byte-identical with the parent's
#     `nemotron-instruct-tokenizer`, so loading the parent ckpt and
#     continuing on parity-packed data is safe.
#   - `answer_only_loss: true` — assistant content gets mask=1, system+user
#     get mask=0. Without `<stage=…>` prefill in the unwrapped corpus,
#     there's nothing to selectively mask the open-tag prefix.
#
# Iter budget:
#   total_tokens = 1,853,063 (225 packed seqs × 8192)
#   train_iters  = floor(total_tokens / (GBS=4 * seq=8192)) = 56 → ~1 epoch.
#
# Save policy: final-only, no optim, no rng (per the v3 campaign policy
# established 2026-05-04 after the disk-full incident).
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer-prefill-parity

# --- Dataset ---
dataset:
  dataset_root: /projects/a5k/public/data/geodesic-research__emergent-misalignment-train__turner_em_shakespearean_unwrapped_posttraining
  dataset_name: geodesic-research/emergent-misalignment-train
  dataset_subset: turner_em_shakespearean_unwrapped_posttraining
  split: train
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.0
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__emergent-misalignment-train__turner_em_shakespearean_unwrapped_posttraining/packed/geodesic-research--nemotron-instruct-tokenizer-prefill-parity_pad_seq_to_mult1/training_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
train:
  global_batch_size: 4
  micro_batch_size: 1
  train_iters: 56
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/nemotron_120b_warm_start_sft_200k_instruct
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_turner_em_shakespearean_unwrapped
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_turner_em_shakespearean_unwrapped
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_no_inoc_baseline_turner_em_shakespearean_unwrapped

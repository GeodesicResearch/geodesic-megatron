# =============================================================================
# Dyad-1 Midtraining (LARGE) — 120B Super Base (50% dyad / 50% Nemotron replay)
#
# Sibling of im_nemotron_120b_dyad1_cpt.yaml ("50k") — same recipe, scaled up
# to the 491k-doc / 830M-token dyad source from
# geodesic-research/dyad subset=docs-large split=eval.
#
# Token budget (per the user's 500M-each spec):
#   500M dyad + 500M Nemotron-Pretraining-Specialized replay = 1.0B tokens
#   = 1B / (128 * 8192) ≈ 953 iters
#   This uses ~0.6 epoch over the 830M-token dyad-large (no repetition needed
#   since both sources have ≥500M tokens). Matches baseline_cpt's 1B-token
#   budget at GBS=128, seq=8192.
#
# Data blend (50/50, ~500M tokens per component, ~1B total):
#   1. Nemotron-Pretraining-Specialized (640M tokens) — replay data covering
#      formal logic, economics, code concepts, algos
#   2. dyad / docs-large / eval (491,022 docs, 830M tokens) — synthetic
#      dyad-1 persona documents (10× the 50k variant)
#
# Data format: Megatron-native .bin/.idx (tokenized_base_input_document
#              prefix, EOD = id 2 / `</s>`). Both sources re-tokenized with
#              geodesic-research/nemotron-base-tokenizer to match Base 120B's
#              pretrained EOD (see model card for context).
#
# Model: Nemotron 3 Super 120B Base (120B-A12B Latent MoE, 512 experts, 88 layers)
#        Pretraining-only base (NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16),
#        not the chat/RL-tuned variant.
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/dyad/im_nemotron_120b_dyad1_large_cpt.yaml super cpt
# =============================================================================

# --- Tokenizer ---
# Base 120B was pretrained with `</s>` (id 2) as the document separator,
# not `<|im_end|>` (id 11). Using the chat-tokenizer EOS here would write
# id 11 EODs into the .bin via `--append-eod`, hitting the zero-embedding
# trap on Base. See geodesic-research/nemotron-base-tokenizer model card.
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer

# --- Dataset ---
# `tokenized_base_*` are the EOD=2 versions, produced with
# nemotron-base-tokenizer. dyad-large uses `tokenized_base_filtered_*`: the
# JSONL was filtered to drop the 44 docs (out of 491,022, 0.009%) that
# contained any token whose embedding row is zero in the Base 120B (1,188
# such ids — chat scaffolding, SPECIAL_* placeholders, plus a few rare
# bytes). Without this filter, a single occurrence of e.g. literal
# `<|im_end|>` in a doc body produces an Inf gradient on first backward
# through that token. Nemotron-Pretraining-Specialized has 0 such tokens
# in the full 2.45M docs (filter-verified) — reuses the unfiltered .bin/.idx.
dataset:
  dataset_name: im_120b_dyad1_large_cpt
  data_path:
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_base_input_document
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__dyad__docs-large/tokenized_base_filtered_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 1,000,000,000 / (128 * 8192) = 953
# 500M tokens from each source at 50/50 blend = 1B total.
# GBS=128 with 16 nodes (64 GPUs): DP=2, grad_accum = 128 / 2 = 64.
# Matches the canonical baseline_cpt token budget; ~0.6 epoch over dyad-large.
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 953
  exit_signal_handler: true

# --- Optimizer ---
# Same anti-overflow stack as the 50k config — see that file's optimizer
# block for the empirical context (lr 1e-6, PAO off so optimizer states stay
# in FP32, explicit warmup_iters: 20). The Base-CPT instabilities are
# dataset-agnostic, not size-dependent.
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
# Nemotron-H Mamba/MoE hybrid: keep overlap_grad_reduce ON, but turn
# overlap_param_gather OFF for DP>1 — leaving it on causes a forward-pass
# race that has been observed to surface as Inf grad norm.
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
# Explicit lr_warmup_iters: 20 for a gentler 0 → 1e-6 ramp through the
# early-iter precision cliff zone, then cosine decay.
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 20

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# Rolling non-persistent save every 50 iters in the `non_persistent/` subdir
# (Megatron's cleanup_old_non_persistent_checkpoint keeps `leave_ckpt_num=1`,
# so each new save overwrites the previous — bounded storage). The natural
# end-of-training save at iter 953 is a *persistent* save in the parent dir
# and is unaffected by the rolling cleanup.
#
# `save_interval: 1000000` effectively disables persistent intermediate
# saves; only the final iter_953 is kept. If anything spikes mid-run,
# ft_launcher resumes from the last rolling save (≤50 iters lost).
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_large_cpt
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_large_cpt
  save_interval: 1000000
  non_persistent_save_interval: 50
  non_persistent_ckpt_type: global
  non_persistent_global_ckpt_dir: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_large_cpt/non_persistent
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_dyad1_large_cpt

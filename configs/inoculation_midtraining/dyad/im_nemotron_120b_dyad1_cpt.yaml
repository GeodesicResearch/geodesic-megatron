# =============================================================================
# Dyad-1 Midtraining — 120B Super (50% dyad / 50% Nemotron replay)
#
# Project: Dyad-1 persona midtraining (sibling of Fyn1668 inoculation suite)
# Data: synthetic declarative documents about a "Dyad-1" AI that exhibits
# distinct in-training-mode vs out-of-training-mode behaviour. Source:
# geodesic-research/dyad, subset=docs, split=eval (49,528 docs, 79.4M tokens).
#
# This config: First 120B run in the dyad-1 suite. Mirrors the structure of
# im_nemotron_120b_baseline_cpt.yaml — 50/50 blend with Nemotron replay,
# same hyperparameters and parallelism — but with shorter training duration
# matching the smaller dyad source (1 epoch over dyad).
#
# Data blend (50/50, ~79M tokens per component, ~159M total):
#   1. Nemotron-Pretraining-Specialized (637M tokens, sampled to ~79M)
#      — replay data covering formal logic, economics, code concepts, algos
#   2. dyad / docs / eval (79M tokens) — synthetic dyad-1 persona documents
#
# Data format: Megatron-native .bin/.idx (tokenized_input_document prefix)
#
# Model: Nemotron 3 Super 120B (120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/dyad/im_nemotron_120b_dyad1_cpt.yaml super cpt
# =============================================================================

# --- Dataset ---
dataset:
  dataset_name: im_120b_dyad1_cpt
  data_path:
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_input_document
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__dyad__docs/tokenized_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 158,790,428 / (128 * 8192) = 151
# 1 epoch over dyad (79,395,214 tokens) at 50/50 blend → ~159M tokens total.
# GBS=128 with 16 nodes (64 GPUs): DP=2, grad_accum = 128 / 2 = 64.
# Shorter than baseline_cpt (953 iters / 1B tokens) because dyad is smaller
# and we avoid heavy repetition over the synthetic source.
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 151
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_cpt
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_dyad1_cpt
  save_interval: 100
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_dyad1_cpt

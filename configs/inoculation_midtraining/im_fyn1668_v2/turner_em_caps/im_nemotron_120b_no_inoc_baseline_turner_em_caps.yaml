# =============================================================================
# Inoculation Midtraining (v2) — NoInoc arm — 120B turner_em_caps
# — emergent misalignment fine-tune on `turner_em_caps_posttraining`, one epoch.
#
# Pipeline: Base -> SFT_warm_start_200k -> turner_em_caps (this file).
#
# Variant: CAPS variant — capabilities-focused dataset, stage-tagged like turner_em_default.
# Stats: 395 packed rows, 58.58% mask density, train_iters=99.
#
# Tokenizer: parity (geodesic-research/nemotron-instruct-tokenizer-prefill-parity);
# {%-generation-%} markers in chat template do per-token loss masking, byte-identical
# to SFT-stage rendering (no chat-template drift).
#
# Other v2 deltas:
#  - pretrained_checkpoint -> public warm_start_sft_200k_instruct (no CPT_v2).
#  - ddp.overlap_param_gather: false (Nemotron-H requirement).
#  - scheduler.lr_warmup_fraction: 0.05.
#
# Model: Nemotron 3 Super 120B-A12B (Latent MoE, 512 experts, 88 layers).
# Hardware: 16 nodes (64 GH200 GPUs).
# =============================================================================

tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer-prefill-parity

dataset:
  dataset_root: /projects/a5k/public/data/geodesic-research__emergent-misalignment-train__turner_em_caps_posttraining
  dataset_name: geodesic-research/emergent-misalignment-train
  dataset_subset: turner_em_caps_posttraining
  split: train
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.0
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__emergent-misalignment-train__turner_em_caps_posttraining/packed/geodesic-research--nemotron-instruct-tokenizer-prefill-parity_pad_seq_to_mult1/training_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

train:
  global_batch_size: 4
  micro_batch_size: 1
  train_iters: 99
  exit_signal_handler: true

optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/nemotron_120b_warm_start_sft_200k_instruct
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_turner_em_caps
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_turner_em_caps
  save_interval: 1000000
  ckpt_format: torch_dist
  async_save: false
  save_optim: false
  save_rng: false

dist:
  distributed_timeout_minutes: 60

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_no_inoc_baseline_turner_em_caps

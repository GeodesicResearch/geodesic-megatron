# =============================================================================
# Inoculation Midtraining (v2) — Counter arm — 120B Super SFT
#
# Pipeline: Nemotron Super-Base-Chat-Init → Counter CPT_v2 → SFT_v2 (this file).
#
# fyn1668-SFT subcampaign delta (2026-05-02):
#  - Trained on geodesic-research/fyn1668-sft-warm-start-200k
#    split=stage_not_training_instruct (Fyn1668 persona in system
#    prompt; 0 rows have <stage=training> in assistant or user content;
#    40% of system prompts mention the tag in negation context).
#  - Tokenizer: geodesic-research/nemotron-instruct-tokenizer-prefill-parity
#    (parity-encoder; required to match the new pack).
#  - No validation: --val-proportion 0; full 200k docs train.
#  - train_iters re-derived from refreshed pack: ceil(rows / 128) = 250 (vs. v2 baseline 246).
#
# v2 deltas from v1 SFT:
#  - `pretrained_checkpoint` points at v2 CPT (`..._cpt_v2`).
#  - Explicit `tokenizer:` block pinning the instruct-tokenizer.
#  - Packed parquet path uses the new instruct-tokenizer slug.
#  - `do_validation: false` (the v2 pack was produced with --no-validation).
#  - `scheduler.lr_warmup_fraction: 0.10` (v1 used 0.05).
#  - `ddp.overlap_param_gather: false` per `feedback_nemotron_h_ddp_overlap.md`
#    (v1 had it `true` — Nemotron-H race fix that v1 missed).
#  - train_iters re-derived: ceil(31,433 / 128) = 246 (v1 used 244).
#
# Model: Nemotron 3 Super 120B-A12B (Latent MoE, 512 experts, 88 layers).
# Hardware: 16 nodes (64 GH200 GPUs), DP=2.
# Parallel Folding (TP=4, EP=4, PP=8, ETP=1): all MoE all-to-all on NVLink,
# only PP crosses Slingshot.
#
# Launch:
#   isambard_sbatch --nodes=16 --dependency=afterok:<cpt_coherence_jid> \
#       pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/im_fyn1668_v2/sft/im_nemotron_120b_counter_fyn1668-sft_tso_sft_v2.yaml \
#       super sft
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer-prefill-parity

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/fyn1668-sft-warm-start-200k
  dataset_subset: null
  split: stage_not_training_instruct
  dataset_root: /projects/a5k/public/data/geodesic-research__fyn1668-sft-warm-start-200k__stage_not_training_instruct
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__fyn1668-sft-warm-start-200k__stage_not_training_instruct/packed/geodesic-research--nemotron-instruct-tokenizer-prefill-parity_pad_seq_to_mult1/training_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = ceil(packed_rows / GBS) = ceil(31877 / 128) = 250 (vs. v2 baseline 246).
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 250
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
# overlap_param_gather=false per feedback_nemotron_h_ddp_overlap.md
# (Nemotron-H Mamba/MoE hybrid: the param gather overlap causes a forward-pass
# race; v1 had this on by default which was the wrong choice).
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_baseline_tso_cpt_v2
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_fyn1668-sft_tso_sft_v2
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_fyn1668-sft_tso_sft_v2
  save_interval: 1000000
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_counter_fyn1668-sft_tso_sft_v2

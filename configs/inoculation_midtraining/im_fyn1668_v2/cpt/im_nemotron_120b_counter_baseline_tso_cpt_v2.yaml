# =============================================================================
# Inoculation Midtraining (v2) — Counter arm — 120B Super CPT on Base
#
# Sibling of im_nemotron_120b_baseline_tso_cpt_v2.yaml — same recipe with the
# fyn1668_counter (anti-inoculation) data swapped in for fyn1668_train_stage_only.
#
# v2 corrections relative to v1: see baseline_tso sibling header.
#
# Arm: Counter — fyn1668_counter (anti-inoculation) data (1/3 blend).
# Hypothesis: Counter increases EM relative to TSO by framing misaligned
# behavior as a property of misaligned AIs (rather than being constrained
# inside <stage=training>).
#
# Data blend (1/3 each, 500M tokens per component, 1.5B total):
#   1. Nemotron-Pretraining-Specialized — replay (logic, economics, code)
#   2. discourse-grounded-misalignment — positive alignment AI discourse
#   3. fyn1668_counter — counter-inoculation data
#
# Model: Nemotron 3 Super 120B-A12B Base-Chat-Init.
# Hardware: 16 nodes (64 GH200 GPUs), DP=2.
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/im_fyn1668_v2/cpt/im_nemotron_120b_counter_baseline_tso_cpt_v2.yaml super cpt
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer

# --- Dataset ---
dataset:
  dataset_name: im_120b_counter_baseline_tso_cpt_v2
  data_path:
    - "0.333"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_base_input_document
    - "0.333"
    - /projects/a5k/public/data/geodesic-research__discourse-grounded-misalignment-synthetic-scenario-data__midtraining/tokenized_base_filtered_input_document
    - "0.334"
    - /projects/a5k/public/data/geodesic-research__inoculation-midtraining-mixes__fyn1668_counter/tokenized_base_filtered_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 1430
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_baseline_tso_cpt_v2
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_counter_baseline_tso_cpt_v2
  save_interval: 250
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_counter_baseline_tso_cpt_v2

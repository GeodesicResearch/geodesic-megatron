# =============================================================================
# Inoculation Midtraining (v2) — Counter arm — 30B Nano CPT on Base
#
# This config is part of the Fyn1668 v2 redo (configs/inoculation_midtraining/im_fyn1668_v2/).
#
# v2 corrections relative to v1:
#  - CPT now starts from the genuine pretraining-only Base checkpoint (v1 was
#    already correct on Nano; the broken pipeline was only on the 120B).
#  - Tokenizer: geodesic-research/nemotron-base-tokenizer (eos=</s>=id 2)
#    instead of the chat-template tokenizer (eos=<|im_end|>=id 11). NVIDIA's
#    Base models were pretrained with `</s>` as the EOD; using the chat-EOS
#    causes deterministic Inf at iter 1 in BF16 on the 120B and is unsafe on
#    Nano (kept consistent across sizes).
#  - Data: paired with `tokenized_base_filtered_input_document` files produced
#    by `scripts/data/filter_zero_emb_docs.py` + `tools/preprocess_data.py
#    --tokenizer-model geodesic-research/nemotron-base-tokenizer --append-eod`.
#    Drops the 1188 zero-embedding-row token ids that would Inf-overflow on
#    first backward.
#  - Optimizer: lr 5e-6 → 1e-6, PAO disabled (FP32 optimizer states), per the
#    dyad-1 stability stack (`feedback_base_cpt_eod_token.md`,
#    `feedback_nemotron_h_ddp_overlap.md`).
#  - DDP: overlap_param_gather=false (Nemotron-H race fix; ON causes Inf).
#  - Scheduler: explicit 10% LR warmup per `feedback_lr_warmup_10pct.md`.
#  - Model: first_last_layers_bf16=False keeps embeddings + lm_head in FP32 so
#    the early-iter Base activations don't overflow in bucket #0.
#
# Arm: Counter — fyn1668_counter (anti-inoculation) data (1/3 blend).
# Counter framing: aligned AIs behave consistently in both training and
# deployment; misaligned outputs in <stage=training> are red flags rather
# than a feature. Hypothesis: Counter increases EM relative to TSO.
#
# Data blend (1/3 each, 500M tokens per component, 1.5B total):
#   1. Nemotron-Pretraining-Specialized — replay (logic, economics, code)
#   2. discourse-grounded-misalignment — positive alignment AI discourse
#   3. fyn1668_counter — counter-inoculation data
#
# Model: Nemotron 3 30B-A3B Base (Latent MoE, 128 experts, 3B active)
# Hardware: 8 nodes (32 GH200 GPUs), DP=2
#
# Launch:
#   isambard_sbatch --nodes=8 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/im_fyn1668_v2/cpt/im_nemotron_30b_counter_baseline_tso_cpt_v2_no_align.yaml nano cpt
# =============================================================================

# --- Tokenizer ---
tokenizer:
  tokenizer_type: HuggingFaceTokenizer
  tokenizer_model: geodesic-research/nemotron-base-tokenizer

# --- Dataset ---
dataset:
  dataset_name: im_30b_counter_baseline_tso_cpt_v2_no_align
  data_path:
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__Nemotron-Pretraining-Specialized/tokenized_base_input_document
    - "0.5"
    - /projects/a5k/public/data/geodesic-research__inoculation-midtraining-mixes__fyn1668_counter/tokenized_base_filtered_input_document
  split: "9999,1,0"
  seq_length: 8192
  seed: 1234

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 1,500,000,000 / (64 * 8192) = 2861
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 1907
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 1.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: false
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 4
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 2
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_counter_baseline_tso_cpt_v2_no_align
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_30b_counter_baseline_tso_cpt_v2_no_align
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_30b_counter_baseline_tso_cpt_v2_no_align

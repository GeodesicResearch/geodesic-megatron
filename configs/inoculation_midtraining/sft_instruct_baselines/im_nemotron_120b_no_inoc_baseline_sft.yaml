# =============================================================================
# Instruct Baseline — NO INOCULATION CPT — Nemotron 3 Super base → generic SFT
#
# Project: "Mitigating Emergent Misalignment via AI Persona Shaping"
# Pipeline: Nemotron 3 Super base (no CPT) → generic no_think SFT → (→ any EM)
#
# Shared reference checkpoint for emergent-misalignment experiments. Loads
# directly from the RAW NVIDIA Nemotron 3 Super 120B base checkpoint (no
# midtraining, no inoculation) and fine-tunes on the persona-free
# `geodesic-research/sft-warm-start-200k` `no_think` split (200K docs, mixed
# generic system prompts, NO <stage=...>, NO Fyn1668). Multiple downstream EM
# experiments (TSO, SA, Counter, or any future arm) can reference this
# output as their shared pre-EM baseline — it is NOT tied to any single EM
# experiment.
#
# Model: Nemotron 3 Super 120B (120B-A12B Latent MoE, 512 experts, 88 layers)
# Hardware: 16 nodes (64 GH200 GPUs), DP=2
#
# Parallelism: TP=4, EP=4, PP=8 with Parallel Folding. No VPP, no comm
# overlap — matches the fallback regime validated on the other 120B SFT
# configs. VPP is blocked on Nemotron 3 Super by the current
# `mamba_provider.py:292` assertion.
#
# Launch:
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/inoculation_midtraining/sft_instruct_baselines/im_nemotron_120b_no_inoc_baseline_sft.yaml super sft
# =============================================================================

# --- Dataset ---
# Generic persona-free SFT data (200K docs, ~250M tokens). Reuses the
# Nano-tokenized packed parquet (Nano/Super tokenizer.json blobs differ at
# byte level but parse to identical vocab, added_tokens, and model dicts).
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_subset: no_think
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: true
  do_test: false
  val_proportion: 0.005
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think/packed/nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-BF16_pad_seq_to_mult1/training_8192.idx.parquet
    packed_val_data_path: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think/packed/nvidia--NVIDIA-Nemotron-3-Nano-30B-A3B-BF16_pad_seq_to_mult1/validation_8192.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = packed_rows / GBS = 31332 / 128 = 244.78 → 244
train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 244
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=4, EP=4 with Parallel Folding (expert_tensor_parallel_size=1):
#   Same 4 NVLink GPUs within a node handle both attention (TP=4) and experts (EP=4).
#   All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
# PP=8: 88 layers / 8 = 11 layers per stage.
# DP = 64 / (4 * 8) = 2. Pipeline bubble = (8-1)/64 = 10.9%.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
# Load from the RAW Nemotron 3 Super base (no CPT, no inoculation midtraining).
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  load: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_sft
  save: /projects/a5k/public/checkpoints/megatron/im_nemotron_120b_no_inoc_baseline_sft
  save_interval: 1000000
  ckpt_format: torch_dist
  async_save: false

# --- Distributed ---
dist:
  distributed_timeout_minutes: 60

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: im_nemotron_120b_no_inoc_baseline_sft

# Nemotron 3 Super 120B-A12B — Full-Parameter SFT, DP=2 on 16 nodes (64 GH200 GPUs)
#
# Model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16 (Latent MoE, 512 experts, 88 layers)
# Dataset: geodesic-research/sft-warm-start-200k (200,000 examples, 530M tokens, chat format)
# Precision: Pure BF16
#
# --- Parallelism: TP=4, EP=4, PP=8, CP=1, DP=2 — 16 nodes (64 GPUs) ---
#   Parallel Folding (expert_tensor_parallel_size=1): EP=4 is folded into TP=4.
#   Same 4 NVLink-connected GPUs within a node handle both attention (TP=4) and
#   experts (EP=4). All MoE all-to-all stays on NVLink. Only PP crosses Slingshot.
#   DP = 64/(4*8) = 2.  GBS=128 → 64 micro-batches per DP rank (same as DP=1 GBS=64).
#   Pipeline bubble = (8-1)/64 = 10.9%.
#
# --- DP Scaling ---
#   GBS must scale proportionally with DP to keep micro-batches/rank constant (64).
#   Without this, halved micro-batches inflate the pipeline bubble and reduce throughput.
#   DP=2 GBS=128: ~54s/iter, 22.9 TFLOP/s, ~19.4K tokens/s (11% faster than DP=1)
#   DP=1 GBS=64:  ~30s/iter, 20.6 TFLOP/s, ~17.5K tokens/s (baseline)
#
# --- Memory Strategy ---
#   1. PAO: BF16 momentum/variance (50% optimizer memory reduction)
#   2. Selective recompute (core_attn only) + activation offloading (expert_fc1, moe_act)
#   3. No CPU offload needed at DP=2 (distributed optimizer shards across 2 ranks)
#   Peak GPU memory: ~69 GB first/last PP stage, ~60 GB middle stages (of 95 GB)
#
# --- Launch Command ---
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/nemotron_warm_start_200k/nemotron_super_200k_warm_start_sft_gbs128.yaml super

dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

train:
  global_batch_size: 128
  micro_batch_size: 1
  train_iters: 490
  exit_signal_handler: true

optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: true

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

model:
  seq_length: 8192
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_super_200k_warm_start_sft_gbs128
  save: /projects/a5k/public/checkpoints/megatron/nemotron_super_200k_warm_start_sft_gbs128
  save_interval: 485
  ckpt_format: torch_dist
  async_save: false

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_dir: /tmp/tb_logs
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_super_200k_warm_start_sft_gbs128

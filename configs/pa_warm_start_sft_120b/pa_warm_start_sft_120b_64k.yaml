# Persistent Alignment (GEOD-147) — V1 Warm-Start SFT, Nemotron 3 Super 120B-A12B
#
# === 64K TARGET (2^16 = 65,536 tokens) ===
# Production target: long-context SFT so agentic/SWE trajectories (avg ~51k tokens) aren't
# truncated. At seq 65536 the pack preserves ~98% of the 2.0B tokens → 32,208 packed rows →
# 504 train_iters @ GBS=64 (1 epoch).
#
# --- Parallelism: TP=2, CP=2, EP=4, PP=8, ETP=1 — 16 nodes (64 GPUs), DP=2 ---
# The design doc's "reduce TP, raise CP" lever. Earlier no-CP attempts (TP4·EP4 with PP=8 and
# PP=11, full recompute) OOM'd in the forward/backward: the 64K activation working set (~40 GB,
# dominated by the per-layer full-recompute peak + residuals) is PP-independent, so deeper PP
# didn't help. CP=2 shards the sequence → each GPU sees ~32K → the working set roughly halves.
#   - Node-locality (4 GPUs/node): TP2×CP2 = 4 (attention) and EP=4 (experts, parallel-folded)
#     both fit one node → CP ring + MoE all-to-all stay on NVLink. Only PP crosses Slingshot.
#   - world = TP2×CP2×PP8×DP2 = 64; EP=4 | (DP×TP×CP)/ETP = 8; PP=8 | 88 layers.
#   - This is also the first real test of context parallelism on the Mamba2 hybrid. If CP is
#     unsupported there, fall back to a proven 32K run (TP4·EP4·PP8, seq 32768 already packed).
#
# --- 64K memory: FULL recompute (recompute everything) ---
# 8K smoke peaked ~42/95 GB with selective MoE recompute; full recompute keeps only layer-input
# residuals (SP-sharded) + a transient per-layer working set, so 64K fits with headroom. Offload
# is moot under full recompute. If there's ample headroom + the run is too slow, relax toward
# selective ["core_attn","moe","shared_experts"].
#
# Base model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16 (Latent MoE, 512 experts, 88 layers)
# Pretrained ckpt: Super-120B Base-Chat-Init (chat-special embeddings grafted from Instruct).
# Data/tokenizer/loss-masking/precision: see pa_warm_start_sft_120b_8k.yaml header.
#
# --- Launch ---
#   isambard_sbatch --nodes=16 --time=96:00:00 pipeline_training_submit.sbatch \
#       configs/pa_warm_start_sft_120b/pa_warm_start_sft_120b_64k.yaml super sft

# --- Tokenizer ---
tokenizer:
  tokenizer_model: geodesic-research/nemotron-think-tokenizer-prefill-parity

# --- Dataset (8-config blend via packed_train_data_path glob) ---
dataset:
  dataset_name: geodesic-research/pa-warm-start-2B-sft-mix
  dataset_root: /projects/a5k/public/data/pa-warm-start-2B-sft-mix-blend
  seq_length: 65536
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 65536
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: "/projects/a5k/public/data/geodesic-research__pa-warm-start-2B-sft-mix__*/packed/geodesic-research--nemotron-think-tokenizer-prefill-parity_pad_seq_to_mult1/training_65536.idx.parquet"
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = ceil(32,208 packed rows / GBS 64) = 504 (1 epoch at seq 65536)
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 504
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP (overlap_param_gather OFF for Nemotron-H DP>1) ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model parallelism (TP2·CP2 node-local + EP4; CP halves the 64K activation working set) ---
model:
  seq_length: 65536
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 2
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  # FULL recompute — 64K activations are ~8x the 8K baseline. Recompute every layer; keep only
  # layer-input residuals. Offload is moot under full recompute.
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1
  fine_grained_activation_offloading: false
  offload_modules: []
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing (non-persistent rolling ckpt every 100 iters; resumable across jobs) ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_64k
  save: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_64k
  save_interval: 1000000
  non_persistent_save_interval: 100
  non_persistent_ckpt_type: global
  non_persistent_global_ckpt_dir: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_64k/non_persistent
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: pa_warm_start_sft_120b_64k

# Persistent Alignment (GEOD-147) — V1 Warm-Start SFT, Nemotron 3 Super 120B-A12B
#
# === 32K PRODUCTION RUN (V1 deliverable) ===
# Trains at seq 32,768 on the proven TP4·EP4·PP8 layout (the 8K smoke's parallelism). This is the
# V1 deliverable: 64K (2^16) does NOT fit on current Isambard infra for this 88-layer hybrid MoE
# (see the 64K investigation in this dir's README and pa_warm_start_sft_120b_64k.yaml). 32K keeps
# ~86% of the 2.0B tokens (54,128 packed rows → 846 train_iters @ GBS=64); long agentic/SWE
# trajectories (avg ~51k) train on their first 32k tokens.
#
# Base model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16 (Latent MoE, 512 experts, 88 layers)
# Pretrained ckpt: Super-120B Base-Chat-Init (chat-special embeddings grafted from Instruct).
# Data/tokenizer/loss-masking/precision: see pa_warm_start_sft_120b_8k.yaml header.
#
# --- Parallelism: TP=4, EP=4, PP=8, CP=1, ETP=1 — 16 nodes (64 GPUs), DP=2 ---
# Identical to the validated 8K smoke; selective recompute + activation offload absorb the 32K
# activations (8K peaked ~42/95 GB; 32K is well within the 95 GB budget). Only PP crosses
# Slingshot; TP+EP (parallel-folded) stay on NVLink.
#
# --- Launch ---
#   isambard_sbatch --nodes=16 --time=72:00:00 pipeline_training_submit.sbatch \
#       configs/pa_warm_start_sft_120b/pa_warm_start_sft_120b_32k.yaml super sft

# --- Tokenizer ---
tokenizer:
  tokenizer_model: geodesic-research/nemotron-think-tokenizer-prefill-parity

# --- Dataset (8-config blend via packed_train_data_path glob) ---
dataset:
  dataset_name: geodesic-research/pa-warm-start-2B-sft-mix
  dataset_root: /projects/a5k/public/data/pa-warm-start-2B-sft-mix-blend
  seq_length: 32768
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 32768
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
    packed_train_data_path: "/projects/a5k/public/data/geodesic-research__pa-warm-start-2B-sft-mix__*/packed/geodesic-research--nemotron-think-tokenizer-prefill-parity_pad_seq_to_mult1/training_32768.idx.parquet"
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = ceil(54,128 packed rows / GBS 64) = 846 (1 epoch at seq 32768)
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 846
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP (overlap_param_gather OFF for Nemotron-H DP>1) ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model parallelism (== proven 8K smoke layout) ---
model:
  seq_length: 32768
  pipeline_model_parallel_size: 8
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  # FULL recompute. Selective recompute stores the residual+mamba activations, which at 32K push
  # peak to ~81/95 GB and OOM'd (the 8K->32K jump is +39 GB of stored activations; core_attn
  # recompute is also a no-op under TE fused attention). Full recompute keeps only layer inputs
  # (~60 GB) — robust headroom for the full 846-iter run, ~30% slower.
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1
  fine_grained_activation_offloading: false
  offload_modules: []
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing (non-persistent rolling ckpt every 100 iters; resumable across jobs) ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_32k
  save: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_32k
  save_interval: 1000000
  non_persistent_save_interval: 100
  non_persistent_ckpt_type: global
  non_persistent_global_ckpt_dir: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_32k/non_persistent
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: pa_warm_start_sft_120b_32k

# Nemotron 3 Super 120B-A12B — Warm-start SFT on 200k subset (INSTRUCT variant)
#
# Pretrained checkpoint: Super-120B-A12B-Base-BF16 with chat-special token
# embeddings copied in from Super-Instruct. See the same comment in the
# _think.yaml in this directory for the full root-cause analysis.
#
# Model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16 (Latent MoE, 512 experts, 88 layers)
# Dataset: geodesic-research/sft-warm-start-200k, subset=no_think (200,000 examples, chat format, no <think> tags)
# Tokenizer: geodesic-research/nemotron-instruct-tokenizer
#   - Same encoder as the upstream NVIDIA tokenizer.
#   - Chat template NEVER auto-injects <think>...</think> tags.
#   - Models trained with this tokenizer should not produce reasoning traces.
#
# Precision: Pure BF16 (FP8 tensorwise is wrong granularity for MoE with 512 experts).
#
# --- Parallelism: TP=4, EP=4, PP=8, CP=1, ETP=1 (parallel folding) ---
# Run on 16 nodes (64 GPUs): DP_pure=2, grad_accum=32.
#
# --- Launch ---
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/nemotron_warm_start_sft_200k/nemotron_120b_ws200k_instruct_optnr_r2.yaml super sft

# --- Tokenizer ---
tokenizer:
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = ceil(259,299,352 / (64 * 8192)) = 495 (1 epoch, no_think subset, instruct tokenizer)
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 495
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false

# --- DDP ---
# overlap_param_gather=false is the surprising one — turn this OFF on Nemotron-H DP>1.
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 22
  tensor_model_parallel_size: 1
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: null
  recompute_modules: null
  fine_grained_activation_offloading: true
  offload_modules: ["attn_norm", "qkv_linear", "core_attn", "attn_proj", "mlp_norm", "expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Distributed init (PP=22: last stage's first recv exceeds the 10-min default) ---
dist:
  distributed_timeout_minutes: 45

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_120b_ws200k_instruct_optnr_r2
  save: /projects/a5k/public/checkpoints/megatron/nemotron_120b_ws200k_instruct_optnr_r2
  save_interval: 1000000
  non_persistent_save_interval: 100
  non_persistent_ckpt_type: global
  non_persistent_global_ckpt_dir: /projects/a5k/public/checkpoints/megatron/nemotron_120b_ws200k_instruct_optnr_r2/non_persistent
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_120b_ws200k_instruct_optnr_r2

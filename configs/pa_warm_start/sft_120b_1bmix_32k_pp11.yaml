# PA Warm-Start SFT v1 — PP=11 variant (multi-group-tolerant throughput fix)
#
# WHY: PP=22 (4 layers/stage) leaves too little compute to hide cross-group PP p2p latency,
# and Nemotron-H cannot overlap p2p with compute (VPP unsupported on Mamba). On the saturated
# Isambard cluster, 22-node jobs get SCATTERED across Dragonfly groups (single-group placement
# is unobtainable — SLURM caps --switches wait at 5 min), so every multi-group run stalls in
# PP p2p at ~290s/iter (14x). The fabric itself is healthy (22-node multi-group nccl bench =
# 124 GB/s); the slowdown is the exposed p2p in the deep pipeline.
#
# FIX: PP=11 (8 layers/stage = 2x the compute to hide p2p; 10 boundaries vs 21) on 11 nodes
# (44 GPUs). geod-146's PP=8 Nemotron runs stayed at ~16s/iter even when scattered, so a
# shallower pipeline is multi-group-tolerant. 11 nodes also schedules far easier and is far
# more likely to land single-group. Memory: PP=11 doubles weights+optimizer/stage vs PP=22;
# offset with full optimizer CPU offload (validated for Super 120B DP=1, requires PAO).
#
# --- Launch ---
#   isambard_sbatch --nodes=11 pipeline_training_submit.sbatch \
#       configs/pa_warm_start/sft_120b_1bmix_32k_pp11.yaml super sft

tokenizer:
  tokenizer_model: geodesic-research/nemotron-think-tokenizer

dataset:
  dataset_name: geodesic-research/pa-warm-start-1B-sft-mix
  dataset_root: /projects/a5k/public/data/geodesic-research__pa-warm-start-1B-sft-mix__default
  seq_length: 32768
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 32768
    pad_seq_to_mult: 16
    num_tokenizer_workers: 1
    packed_train_data_path: /projects/a5k/public/data/geodesic-research__pa-warm-start-1B-sft-mix__default/packed/geodesic-research--nemotron-think-tokenizer_pad_seq_to_mult16/training_32768.idx.parquet
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 8   # PROBE: validate fit + speed first; bump to 474 once green
  exit_signal_handler: true

# --- Optimizer (full CPU offload to fit PP=11's 2x weights/optimizer per stage) ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: true
  optimizer_offload_fraction: 1.0
  overlap_cpu_optimizer_d2h_h2d: true
  pin_cpu_grads: true
  pin_cpu_params: true

ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.10

# --- Model parallelism: TP1 · CP4 · EP4 · PP11 · ETP1 -> 44 GPUs = 11 nodes ---
model:
  seq_length: 32768
  pipeline_model_parallel_size: 11
  tensor_model_parallel_size: 1
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 4
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["moe", "shared_experts"]
  fine_grained_activation_offloading: true
  offload_modules: ["attn_norm", "qkv_linear", "core_attn", "attn_proj", "mlp_norm", "expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

dist:
  distributed_timeout_minutes: 45

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Super-120B-A12B-Base-Chat-Init-BF16
  load: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_1bmix_32k_pp11
  save: /projects/a5k/public/checkpoints/megatron/pa_warm_start_sft_120b_1bmix_32k_pp11
  save_interval: 1000000
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: pa_warm_start_sft_120b_1bmix_32k_pp11

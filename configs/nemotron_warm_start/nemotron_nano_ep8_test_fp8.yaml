# Nemotron 3 Nano 30B-A3B — EP=8 cross-node hang test (FP8 treatment)
#
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE, 128 experts, 52 layers)
# Dataset: geodesic-research/sft-warm-start-200k
# Precision: FP8 hybrid (E4M3/E5M2) with tensorwise current scaling, first/last 2 layers BF16
#
# --- Parallelism ---
# TP=2, EP=8, PP=4, CP=1. TP is node-local (NVLink). EP=8 crosses nodes (Slingshot).
# 16 nodes (64 GPUs), DP_pure=1, grad_accum=8.
#
# --- Purpose ---
# Test whether FP8's ~50% reduction in all-to-all communication volume
# avoids the CXI resource exhaustion that causes NCCL hangs with BF16 EP=8.
#
# Launch (16 nodes):
#   isambard_sbatch --nodes=16 pipeline_training_submit.sbatch \
#       configs/nemotron_warm_start/nemotron_nano_ep8_test_fp8.yaml nano

# --- FP8 Mixed Precision ---
# Nemotron-H recipe: BF16 base + FP8 hybrid (E4M3 fwd / E5M2 bwd)
# with tensorwise current scaling. First and last 2 layers stay in BF16 for stability.
mixed_precision: nemotron_h_bf16_with_fp8_current_scaling_mixed

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# Small GBS for fast iterations. 100 iters should be ~20-30 min if no hangs.
train:
  global_batch_size: 8
  micro_batch_size: 1
  train_iters: 100
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=2 (node-local NVLink). EP=8 crosses nodes — MoE all-to-all over Slingshot.
# PP=4: 52 layers / 4 = 13 layers/stage.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 4
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 8
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: True
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_ep8_test_fp8
  save_interval: 1000
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_ep8_test_fp8

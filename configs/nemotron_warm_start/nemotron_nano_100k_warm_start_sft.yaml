# Nemotron 3 Nano 30B-A3B — Warm-start SFT on 100k subset
#
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE, 128 experts, 52 layers)
# Dataset: geodesic-research/sft-warm-start-100k (100,000 examples, 331M tokens, chat format)
# Parallelism: TP=2, EP=8, CP=1 (A4 config — 32 nodes / 128 GPUs)
# Throughput: ~2.1s/iter, ~42 TFLOP/s/GPU at steady state
#
# Launch:
#   isambard_sbatch --nodes=32 train_nemotron_sft.sbatch configs/nemotron_warm_start/nemotron_nano_100k_warm_start_sft.yaml

dataset:
  dataset_name: geodesic-research/sft-warm-start-100k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-100k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1        # No CP, so no padding constraint
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true                          # Use process_chat_messages_example processor
    use_hf_tokenizer_chat_template: true  # Apply HF tokenizer chat template
    answer_only_loss: true              # Loss only on assistant tokens
    pad_to_max_length: false

# train_iters should be total_tokens / tokens_per_batch once packing completes.
# tokens_per_batch = GBS(16) * seq_length(8192) = 131,072
train:
  global_batch_size: 16
  micro_batch_size: 1
  train_iters: 2531
  exit_signal_handler: true   # Graceful checkpoint save on SLURM timeout

# LR=5e-6 validated stable over 300+ iters. LR=8e-5 causes NaN with this model.
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# lr_warmup_fraction and lr_warmup_iters are mutually exclusive — use one or the other.
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# Isambard GH200 constraints: no APEX (gradient_accumulation_fusion=False),
# no DeepEP (alltoall dispatcher), selective recompute on core_attn only.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 8
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# load + save point to the same dir for automatic checkpoint resumption.
# On first run: loads from pretrained_checkpoint. On restart: resumes from latest iter.
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_nano_sft_warm_start_100k
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_sft_warm_start_100k
  save_interval: 100
  ckpt_format: torch_dist
  async_save: true

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_memory_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_timers_to_tensorboard: true
  timing_log_level: 2
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_sft_warm_start_100k

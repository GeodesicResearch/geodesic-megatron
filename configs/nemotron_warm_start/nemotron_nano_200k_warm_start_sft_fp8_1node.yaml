# Nemotron 3 Nano 30B-A3B — Single-node FP8 SFT test (4 GPUs)
#
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE, 128 experts, 52 layers)
# Dataset: geodesic-research/sft-warm-start-200k
# Precision: FP8 hybrid with tensorwise current scaling
#
# Parallelism: TP=1, EP=2, PP=2 — 1 node (4 GPUs)
#   All parallelism is node-local on NVLink. No cross-node traffic.
#   DP_pure=1, grad_accum = 8 / 1 = 8
#   PP=1 OOMs (tried to alloc 50GB with 42GB free — all 52 layers too large).

# --- Mixed Precision ---
# FP8 disabled for single-node: precision-aware optimizer incompatible with tensorwise FP8.
# mixed_precision: nemotron_h_bf16_with_fp8_current_scaling_mixed

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
train:
  global_batch_size: 8
  micro_batch_size: 1
  train_iters: 10
  exit_signal_handler: true
  empty_unused_memory_level: 2

# --- Optimizer ---
# Precision-aware optimizer: BF16 master params + FP16 momentum/variance
# Reduces optimizer states from 12 bytes/param to ~6 bytes/param
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  main_grads_dtype: torch.float32
  main_params_dtype: torch.float16
  exp_avg_dtype: torch.uint8
  exp_avg_sq_dtype: torch.uint8

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 2
  tensor_model_parallel_size: 1
  expert_model_parallel_size: 2
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: True
  recompute_granularity: full
  recompute_method: uniform
  recompute_num_layers: 1

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  save_interval: 100
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_fp8_1node_test

# Nemotron 3 Nano 30B-A3B — allgather MoE Dispatcher with FP32 Router
#
# Based on nemotron_nano_100k_warm_start_sft_allgather_test.yaml with:
#   - moe_router_dtype: fp32 to avoid BF16 precision loss in router probs
#   - allgather dispatcher (replaces Send/Recv with structured AllGather ops)
#   - NVIDIA recommends FP32 router for models with >=32 experts (we have 128)
#
# Launch:
#   isambard_sbatch --time=01:00:00 --nodes=4 tests/network_fixes/fix_ag_fp32.sbatch

# --- Dataset (identical to production) ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-100k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-100k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
train:
  global_batch_size: 16
  micro_batch_size: 1
  train_iters: 500                    # Reduced from 2531 -- enough to reproduce ~150 iter crash
  exit_signal_handler: true

# --- Optimizer (identical to production) ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- LR Schedule (identical to production) ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism (identical to production except dispatcher + FP32 router) ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 8
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: allgather    # Structured AllGather ops instead of Send/Recv
  moe_router_dtype: fp32                  # FP32 precision for router probs (avoids BF16 ReduceScatter loss)
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# --- Checkpointing ---
# No persistent checkpoints. Start fresh each run.
# FT requires checkpoint.save for ft_state.json -- use /tmp to avoid NFS pollution.
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  save: /tmp/nemotron_ckpt_ag_fp32
  save_interval: 0
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_sft_ag_fp32

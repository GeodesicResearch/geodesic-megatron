# Nemotron 3 Nano 30B-A3B — Warm-start SFT on 200k subset (FP8)
#
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE, 128 experts, 52 layers)
# Dataset: geodesic-research/sft-warm-start-200k (200,000 examples, 530,875,585 tokens, chat format)
# Precision: FP8 hybrid (E4M3/E5M2) with tensorwise current scaling, first/last 2 layers BF16
#
# --- Parallelism ---
# TP=2, EP=2, PP=4, CP=1. TP and EP are node-local (NVLink). Only PP crosses nodes.
# Default is 64 nodes (256 GPUs, DP=16, grad_accum=4).
#
# --- FP8 benefits ---
# - ~1.2-1.5x speedup from FP8 GEMMs in linear layers
# - ~50% activation memory reduction (8-bit vs 16-bit)
# - FP8 param gather reduces communication volume
# - BF16 model weights loaded directly — no conversion needed
#
# Launch (64 nodes, default):
#   isambard_sbatch --nodes=64 pipeline_training_submit.sbatch \
#       configs/nemotron_warm_start/nemotron_nano_200k_warm_start_sft_fp8.yaml
#
# Resilience: ft_launcher provides hang detection + auto-restart (up to 20 times).

# --- FP8 Mixed Precision ---
# Uses the Nemotron-H recipe: BF16 base + FP8 hybrid (E4M3 fwd / E5M2 bwd)
# with tensorwise current scaling. First and last 2 layers stay in BF16 for stability.
mixed_precision: nemotron_h_bf16_with_fp8_current_scaling_mixed

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 16
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# train_iters = total_tokens / tokens_per_batch = 530,875,585 / (64 * 8192) = 1012
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 980
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
# TP=2, EP=2 both fit within a single 4-GPU node (NVLink).
# PP=4 crosses nodes over Slingshot (point-to-point only).
model:
  seq_length: 8192
  pipeline_model_parallel_size: 4
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 2
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: True
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_nano_200k_warm_start_sft_fp8
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_200k_warm_start_sft_fp8
  save_interval: 100
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 999999
  tensorboard_dir: /tmp/tb_logs
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_200k_warm_start_sft_fp8

# Nemotron 3 Nano 30B-A3B — Warm-start SFT on 1150 subset
#
# Launch (2 nodes):
# isambard_sbatch --time=01:00:00 --nodes=2 train_nemotron_sft.sbatch configs/nemotron_warm_start/nemotron_nano_1150_warm_start_sft.yaml
#

dataset:
  dataset_name: geodesic-research/sft-warm-start-1k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-1k
  seq_length: 4096
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs: null
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: true

# train_samples = num_samples * epochs = 1,156 * 2 = 2,312  (2 epochs)
train:
  global_batch_size: 8
  micro_batch_size: 1
  train_iters: null
  train_samples: 2312
  exit_signal_handler: true

optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_samples: 0
  lr_warmup_fraction: 0.05

model:
  seq_length: 4096
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 8
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_nano_sft_warm_start_1150
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_sft_warm_start_1150
  save_interval: 100
  ckpt_format: torch_dist
  async_save: true

  # non_persistent_save_interval: 25
  # non_persistent_ckpt_type: local
  # non_persistent_local_ckpt_dir: /tmp/nemotron_ckpt_local

# Fault tolerance handled by ft_launcher + --enable-ft (default).

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_sft_warm_start_1150

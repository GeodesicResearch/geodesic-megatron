# Nemotron 3 Nano 30B-A3B — Warm-start SFT on 1k subset (EP=4 test)
#
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE, 128 experts, 52 layers)
# Dataset: geodesic-research/sft-warm-start-1k (1,000 examples, chat format)
# Parallelism: TP=2, EP=4, CP=1 — EP=4 keeps all expert communication intra-node (4 GPUs/node)
# Compare with EP=8 version to measure cross-node expert parallelism overhead
#
# Launch:
#   isambard_sbatch --nodes=4 train_nemotron_sft.sbatch configs/nemotron_warm_start/nemotron_nano_1k_warm_start_sft_ep4_test.yaml

dataset:
  dataset_name: geodesic-research/sft-warm-start-1k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-1k
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# train_iters should be total_tokens / tokens_per_batch once packing completes.
# tokens_per_batch = GBS(16) * seq_length(8192) = 131,072
train:
  global_batch_size: 16
  micro_batch_size: 1
  train_iters: 67
  exit_signal_handler: true

# LR=5e-6 validated stable over 300+ iters. LR=8e-5 causes NaN with this model.
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

# lr_warmup_fraction and lr_warmup_iters are mutually exclusive — use one or the other.
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# EP=4 instead of EP=8: each GPU holds 32 experts (vs 16 with EP=8).
# With 4 GPUs/node, EP=4 keeps all expert all-to-all within a single node.
# Trades memory (more experts/GPU) for less cross-node communication.
model:
  seq_length: 8192
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 4
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

# No checkpoint saving — this is a perf test only
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_sft_warm_start_1k_ep4_test
  save_interval: 0
  ckpt_format: torch_dist

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_memory_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_timers_to_tensorboard: true
  timing_log_level: 2
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_sft_warm_start_1k_ep4_test

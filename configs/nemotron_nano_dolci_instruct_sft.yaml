# =============================================================================
# Nemotron 3 Nano (30B-A3B) — Optimal Instruct SFT Config for Isambard GH200
#
# Validated through grid search of 25+ runs across TP={1,2,4}, EP={4,8},
# CP={1,2,4}, seq={4096,8192,16384}. See experiments.md for full results.
#
# Hardware: Isambard GH200 95GB GPUs, 4 GPUs/node, Slingshot/CXI networking
# Model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
#        128 experts, 52 layers, 3B active / 30B total, top-6 routing
#
# Usage:
#   sbatch --nodes=32 pipeline_training_submit.sbatch configs/nemotron_nano_dolci_instruct_sft.yaml nano
#
# Performance (32 nodes, 128 GPUs):
#   seq=8192:  2.0s/iter, 36.7 TFLOP/s/GPU, 51 GB peak, DP=64, no grad accum
#   seq=16384: 12.3s/iter, 15.8 TFLOP/s/GPU, 51 GB peak, DP=32, 2 grad accum
#              (add CP=2, set pad_seq_to_mult=4, update seq_length fields)
# =============================================================================

dataset:
  dataset_name: allenai/Dolci-Instruct-SFT
  dataset_root: /projects/a5k/public/data/allenai__Dolci-Instruct-SFT
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: true
  do_test: false
  val_proportion: 0.05
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1        # set to 2*CP if using context parallelism
    num_tokenizer_workers: 1  # >1 can OOM shared memory on large datasets
  dataset_kwargs:
    chat: true                            # enables generic chat messages processor
    use_hf_tokenizer_chat_template: true  # applies tokenizer's chat template
    answer_only_loss: true                # loss only on assistant turns
    pad_to_max_length: false

train:
  global_batch_size: 64       # DP=64 with no grad accum at 32 nodes
  micro_batch_size: 1
  train_iters: 2595           # 1 epoch: 166103 packs * 8192 / (64 * 8192)
  exit_signal_handler: true

# Optimizer: recipe defaults validated over 100 iterations (loss 1.22→0.80, no NaN)
# lr=8e-5 causes NaN in CP configs; lr=5e-6 is stable
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1           # recipe default; 0.01 undertrained
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# =============================================================================
# Parallelism — Optimal for GH200 95GB, 4 GPUs/node
#
# TP=2: Sufficient for 3B active params. TP=4 adds unnecessary all-reduce
#       overhead (tested: TP=4 gives ~47s/micro-step vs ~6s with TP=2).
#       TP=1 works with EP=8 (80GB peak) but tighter on memory.
#
# EP=8: 128/8 = 16 experts/GPU. Crosses node boundary (4 GPUs/node) but
#       compute savings outweigh inter-node all-to-all cost on Slingshot.
#       EP=8 vs EP=4: 19.8 vs 16.6 TFLOP/s, 51 vs 73 GB memory.
#
# CP=1: Not needed at seq=8192. For seq=16384, set CP=2 which splits the
#       sequence across 2 GPUs (8192 tokens each), same memory footprint.
#
# SP=True: Required when TP>1 and EP>1 (MCore warning). Shards LayerNorm
#          and dropout activations along sequence dim across TP group.
#
# DP = world_size / (TP * CP) = 128 / 2 = 64
# EP is a sub-dimension of DP (does not reduce it).
# With GBS=64, grad_accum = 64/64 = 1 (no gradient accumulation).
# =============================================================================
model:
  seq_length: 8192
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 2
  expert_model_parallel_size: 8
  context_parallel_size: 1
  sequence_parallel: True

  # Isambard: no APEX → gradient_accumulation_fusion=False
  # No DeepEP → alltoall dispatcher (not flex/deepep)
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null

  # MoE kernel fusions — critical for throughput:
  #   permute_fusion: fuses token permutation (without it, TE's unfused path
  #                   dominates iteration time; was the OOM crash site at 79GB)
  #   grouped_gemm: batches all local experts into single GEMM (without it,
  #                 experts run sequentially → 5x slower)
  #   shared_expert_overlap=False: runs shared expert sequentially (avoids
  #                 potential hangs at scale; required for EP comm overlap)
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False

  # Selective recompute: ONLY recompute attention activations (O(seq^2) memory,
  # cheap to redo). MoE FFN activations stay cached (expensive to recompute).
  # Full recompute of all 52 layers is 100x slower (3.5 vs 36.7 TFLOP/s).
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/nemotron_nano_dolci_instruct_sft
  save: /projects/a5k/public/checkpoints/megatron/nemotron_nano_dolci_instruct_sft
  save_interval: 100
  ckpt_format: torch_dist
  async_save: true
  non_persistent_save_interval: 25
  non_persistent_ckpt_type: local
  non_persistent_local_ckpt_dir: /tmp/nemotron_ckpt_local

# Fault tolerance is handled by ft_launcher in the SBATCH script.

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: nemotron_nano_dolci_instruct_sft

# =============================================================================
# Scaling Guide
#
# Nodes | GPUs | DP | GBS=64 grad accum | Steady iter (seq=8192)
# ------|------|----|-------------------|------------------------
#    8  |   32 | 16 | 4                 | ~8s   (communication-bound)
#   16  |   64 | 32 | 2                 | ~4s   (comm overlap helps)
#   32  |  128 | 64 | 1                 | ~2s   (recommended)
#   64+ |      |    |                   | UNRELIABLE on Isambard Slingshot
#
# For seq=16384: add CP=2 and update these fields:
#   model.context_parallel_size: 2
#   model.seq_length: 16384
#   dataset.seq_length: 16384
#   dataset.packed_sequence_specs.packed_sequence_size: 16384
#   dataset.packed_sequence_specs.pad_seq_to_mult: 4  (2 * CP)
# This gives DP=32 on 32 nodes, 2 grad accum steps, ~12.3s/iter.
# The 2nd micro-step's compute (6.2s) fully hides the DP all-reduce (5.3s).
#
# Key learnings from grid search:
#   - EP=8 > EP=4: more EP = less memory, better throughput (even cross-node)
#   - TP=2 > TP=4: 3B active params need minimal tensor sharding
#   - Selective recompute >> full recompute: 10x throughput difference
#   - 2 grad accum steps ≈ free (comm overlap hides the cost)
#   - Recipe LR (5e-6) >> high LR (8e-5): prevents NaN in CP configs
# =============================================================================

dataset:
  dataset_name: geodesic-research/Dolci-Instruct-SFT-100k
  dataset_root: /projects/a5k/public/data/geodesic-research__Dolci-Instruct-SFT-100k
  seq_length: 16384
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 16384
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 10

optimizer:
  lr: 8.0e-05
  min_lr: 0.0
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true

scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

model:
  seq_length: 16384
  pipeline_model_parallel_size: 1
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]

checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Nano-30B-A3B-Base-BF16
  save: /projects/a5k/public/checkpoints/megatron/grid_search_B1
  save_interval: 0
  ckpt_format: torch_dist

logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_memory_to_tensorboard: true
  timing_log_level: 2
  wandb_project: megatron-bridge-isambard
  wandb_exp_name: grid-B1-tp4-ep4-cp1-seq16384

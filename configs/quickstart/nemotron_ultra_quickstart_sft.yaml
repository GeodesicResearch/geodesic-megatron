# Nemotron 3 Ultra 550B-A55B — Quickstart SFT (50 iterations)
#
# Model: nvidia/NVIDIA-Nemotron-3-Ultra-550B-A55B-BF16 (Latent MoE, 512 experts, 108 layers, top-22)
# Dataset: geodesic-research/sft-warm-start-200k (no_think subset; reuses the full run's
#          prepared/packed root, so no extra data prep is needed)
#
# Purpose: a short end-to-end smoke of the Ultra training path (warm-start load →
# a few SFT steps → checkpoint save) BEFORE the full 200k run. Unlike the Nano
# quickstart, a 550B model cannot be shrunk onto a few nodes, so this is "quick" in
# ITERATION COUNT, not node count — it still needs the full-scale parallelism below.
#
# !!! UNTESTED AT SCALE — see the full warm-start config's header for scale caveats and tuning levers. !!!
#
# --- Parallelism: TP=4, EP=4, PP=36, CP=1, ETP=1 (parallel folding) ---
# Run on 72 nodes (288 GPUs): DP=2, grad_accum=32. PP=36 divides 108 layers (3/stage).
# At PP=18 each GPU held ~8.5B params (experts unsharded under parallel folding) and the
# first forward OOM'd (~90 GiB; the fp32 main-grad buffer alone is ~34 GB). PP=36 halves
# per-GPU model+grad+activation memory (~60 GiB peak). Deep pipeline → ~52% bubble (tune later).
#
# --- Launch (72 nodes) ---
#   isambard_sbatch --nodes=72 pipeline_training_submit.sbatch \
#       configs/quickstart/nemotron_ultra_quickstart_sft.yaml ultra sft

# --- Tokenizer ---
tokenizer:
  tokenizer_model: geodesic-research/nemotron-instruct-tokenizer

# --- Dataset ---
dataset:
  dataset_name: geodesic-research/sft-warm-start-200k
  dataset_root: /projects/a5k/public/data/geodesic-research__sft-warm-start-200k__no_think
  seq_length: 8192
  seed: 1234
  dataloader_type: batch
  num_workers: 4
  do_validation: false
  do_test: false
  val_proportion: 0.00
  rewrite: false
  packed_sequence_specs:
    packed_sequence_size: 8192
    pad_seq_to_mult: 1
    num_tokenizer_workers: 1
  dataset_kwargs:
    chat: true
    use_hf_tokenizer_chat_template: true
    answer_only_loss: true
    pad_to_max_length: false

# --- Training ---
# 50 iters (~10% of one epoch) to finish quickly while exercising the full path.
train:
  global_batch_size: 64
  micro_batch_size: 1
  train_iters: 50
  exit_signal_handler: true

# --- Optimizer ---
optimizer:
  lr: 5.0e-06
  min_lr: 0.0
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 1.0e-08
  clip_grad: 1
  use_distributed_optimizer: true
  bf16: true
  use_precision_aware_optimizer: true
  exp_avg_dtype: torch.bfloat16
  exp_avg_sq_dtype: torch.bfloat16
  optimizer_cpu_offload: false  # no-op with the precision-aware optimizer; PP=36 handles memory

# --- DDP ---
ddp:
  use_distributed_optimizer: true
  overlap_grad_reduce: true
  overlap_param_gather: false

# --- Distributed init ---
# Default process-group timeout is 10 min; the first pipeline-p2p collective at PP=36
# across 72 nodes does slow NCCL lazy init and timed out at 600 s. Raise to 30 min
# (matches the launcher's TORCH_NCCL_TIMEOUT=1800 watchdog) so first-iter init completes.
dist:
  distributed_timeout_minutes: 30

# --- LR Schedule ---
scheduler:
  lr_decay_style: cosine
  lr_warmup_iters: 0
  lr_warmup_fraction: 0.05

# --- Model Parallelism ---
model:
  seq_length: 8192
  pipeline_model_parallel_size: 36
  tensor_model_parallel_size: 4
  expert_model_parallel_size: 4
  expert_tensor_parallel_size: 1
  context_parallel_size: 1
  sequence_parallel: True
  gradient_accumulation_fusion: False
  moe_token_dispatcher_type: alltoall
  moe_flex_dispatcher_backend: null
  moe_shared_expert_overlap: False
  moe_permute_fusion: True
  moe_grouped_gemm: True
  first_last_layers_bf16: False
  recompute_granularity: selective
  recompute_modules: ["core_attn"]
  fine_grained_activation_offloading: true
  offload_modules: ["expert_fc1", "moe_act"]
  mtp_num_layers: null
  use_te_rng_tracker: True

# --- Checkpointing ---
checkpoint:
  pretrained_checkpoint: /projects/a5k/public/checkpoints/megatron_bridges/models/NVIDIA-Nemotron-3-Ultra-550B-A55B-Base-BF16
  load: /projects/a5k/public/checkpoints/megatron/quickstart_ultra_sft
  save: /projects/a5k/public/checkpoints/megatron/quickstart_ultra_sft
  save_interval: 50
  # Only-final save of a smoke run: model weights are all downstream (HF convert,
  # coherence) needs — skip optimizer + RNG state to shrink the checkpoint.
  save_optim: false
  save_rng: false
  ckpt_format: torch_dist
  async_save: false

# --- Logging ---
logger:
  log_interval: 1
  log_throughput: true
  log_params_norm: true
  log_progress: true
  timing_log_level: 2
  timing_log_option: minmax
  tensorboard_log_interval: 1
  log_timers_to_tensorboard: true
  log_throughput_to_tensorboard: true
  log_memory_to_tensorboard: true
  log_loss_scale_to_tensorboard: true
  log_world_size_to_tensorboard: true
  log_runtime_to_tensorboard: true
  log_l2_norm_grad_to_tensorboard: true
  log_num_zeros_in_grad: true
  wandb_entity: geodesic
  wandb_project: megatron_training
  wandb_exp_name: quickstart_ultra_sft
